<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venture | Chat</title>
    <link rel="stylesheet" href="./styles/Chat.css">
    <link rel="icon" href="resources/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="resources/favicon.ico" type="image/x-icon">
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JXMEC88ELT"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-JXMEC88ELT');
</script>

<body>
    <div class="chat-container">

        <!-- ── Header ─────────────────────────────────────────── -->
        <header>
            <div class="header-left">
                <a href="home.html">
                    <img src="resources/V-BGremoved.png" alt="Venture Logo" class="header-logo">
                </a>
            </div>

            <div class="header-center">
                <h2 id="chat-title"></h2>
                <div id="username"></div>
            </div>

            <div class="header-right">
                <!-- Home -->
                <a href="home.html" class="header-icon-btn" title="Home">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </a>
                <!-- Settings -->
                <a href="settings.html" class="header-icon-btn" title="Settings">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </a>
                <!-- Logout — small icon button -->
                <button id="logout" title="Logout">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- ── Chat messages ──────────────────────────────────── -->
        <div id="chat"></div>

        <!-- ── Typing indicator ───────────────────────────────── -->
        <div id="typingIndicator" class="typing-dots" style="display:none">
            <span></span><span></span><span></span>
        </div>

        <!-- ── Bottom: reply bar + input + actions ────────────── -->
        <div class="chat-bottom">

            <!-- Upload progress -->
            <div id="uploadBar" style="display:none;">
                <div id="uploadFill"></div>
                <span id="uploadLabel">Uploading…</span>
            </div>

            <!-- Reply bar -->
            <div id="replyBar">
                <span id="replyText"></span>
                <button id="cancelReply" title="Cancel reply">✕</button>
            </div>

            <!-- Input row -->
            <div id="input-row">
                <button id="attachBtn" title="Attach file">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <input type="file" id="fileInput" style="display:none;" accept="image/*,video/*,.pdf,.doc,.docx,.txt,.zip">
                <input id="msg" type="text" placeholder="Type a message…" autocomplete="off">
            </div>

            <!-- Send + Clear -->
            <div id="buttons">
                <button id="send">Send</button>
                <button id="clearbtn">Clear Chat</button>
            </div>

        </div>
    </div>

    <!-- Context menu -->
    <div id="msgMenu">
        <button id="menuCopy">Copy</button>
        <button id="menuReply">Reply</button>
        <button id="menuReport">Report</button>
    </div>

    <script src="./script/global-settings.js"></script>
    <script type="module" src="./script/Chat.js"></script>
</body>
</html>
