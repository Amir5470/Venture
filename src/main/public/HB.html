<!DOCTYPE html>
<html>
  <head>
    <title>Don Taylor Birthday</title>
    <meta name="description" content="Happy birthday, Don. Glad we got to work with you the past few months, and we are
    so excited to get to work with you and help on some projects. If I become a successful software developer,
    it would all be thanks to you for getting me into this. Never thought I'd enjoy web-dev but here I am. Happy birthday!" />
  </head>
  <body>
      <div class="screen">
  <div class="background"></div>
  <div class="stars"></div>

  <div class="computer">
    <div class="monitor">
      <div class="glow"></div>
      <div class="code">
        <span class="line" style="--i:1">Initializing athletics...</span>
        <span class="line" style="--i:2">Loading mentor.exe</span>
        <span class="line" style="--i:3">BusinessPartnerMode = TRUE;</span>
        <span class="line" style="--i:4">CreativityLevel = MAX;</span>
        <span class="line special" style="--i:5">Happy Birthday Don Taylor!</span>
      </div>
    </div>
    <div class="stand"></div>
    <div class="base"></div>
  </div>

  <h1 class="main-text">HAPPY BIRTHDAY</h1>
  <h2 class="name">DON TAYLOR</h2>
  <div class="subtitle">Our Web Development Mentor & Meeting Boss</div>

  <canvas id="confetti"></canvas>

  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Worthington_Ohio_Seal.png">
</div>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: monospace;
}

.screen {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
}

.background {
  position: absolute;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg,#ff0080,#7928ca,#00ffff,#ffcc00);
  background-size: 400% 400%;
  animation: gradientMove 10s infinite linear;
  z-index: -3;
}

@keyframes gradientMove {
  0% {transform:translate(-25%,-25%)}
  50% {transform:translate(0%,0%)}
  100% {transform:translate(-25%,-25%)}
}

.stars::before {
  content: "";
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  box-shadow: 20px 30px white, 200px 150px white, 400px 300px white,
              600px 100px white, 800px 400px white, 1000px 200px white;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from {opacity:.2}
  to {opacity:1}
}

.main-text {
  font-size: 4em;
  letter-spacing: 8px;
  animation: pop 1.5s infinite alternate;
  text-shadow: 0 0 20px cyan,0 0 40px magenta;
}

@keyframes pop {
  from {transform:scale(1)}
  to {transform:scale(1.1)}
}

.name {
  font-size: 3em;
  color: yellow;
  animation: rainbow 3s linear infinite;
}

@keyframes rainbow {
  0%{color:#ff0000}
  25%{color:#00ff00}
  50%{color:#00ffff}
  75%{color:#ff00ff}
  100%{color:#ff0000}
}

.subtitle {
  margin-top: 10px;
  font-size: 1.2em;
  opacity: .9;
}

.computer {
  position: absolute;
  top: 10%;
  width: 300px;
  height: 220px;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-20px)}
}

.monitor {
  width: 100%;
  height: 160px;
  background: #111;
  border: 8px solid #444;
  border-radius: 10px;
  position: relative;
  overflow: hidden;
}

.glow {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center,rgba(0,255,255,.2),transparent);
  animation: screenPulse 3s infinite;
}

@keyframes screenPulse {
  0%,100%{opacity:.3}
  50%{opacity:.8}
}

.code {
  position: absolute;
  padding: 10px;
  color: #00ff00;
  font-size: .9em;
}

.line {
  display: block;
  opacity: 0;
  animation: typing 1s forwards;
  animation-delay: calc(var(--i) * 1s);
}

.special {
  color: cyan;
  font-weight: bold;
  text-shadow: 0 0 10px cyan;
}

@keyframes typing {
  to {opacity:1}
}

.stand {
  width: 40px;
  height: 20px;
  background: #555;
  margin: auto;
}

.base {
  width: 120px;
  height: 20px;
  background: #333;
  margin: auto;
  border-radius: 5px;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.logo {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 120px;
  animation: spin 10s linear infinite;
}

@keyframes spin {
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}
</style>

<script>
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];
for(let i=0;i<200;i++){
  pieces.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*8+2,
    speed:Math.random()*3+2,
    color:`hsl(${Math.random()*360},100%,50%)`
  });
}

function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,p.size,p.size);
    p.y+=p.speed;
    if(p.y>canvas.height) p.y=0;
  });
  requestAnimationFrame(update);
}
update();

window.addEventListener("resize",()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});
</script>

  </body>
</html>
